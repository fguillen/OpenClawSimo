# OpenClaw self-hosted deployment
# Docs: https://docs.openclaw.ai

x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  openclaw:
    image: coollabsio/openclaw:latest
    restart: unless-stopped
    env_file: .env
    logging: *default-logging
    stop_grace_period: 30s
    environment:
      - BROWSER_CDP_URL=http://browser:9222
    volumes:
      - openclaw-data:/data
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.openclaw.rule=Host(`claw.example.es`)
      - traefik.http.routers.openclaw.entrypoints=websecure
      - traefik.http.routers.openclaw.tls.certresolver=letsencrypt
      - traefik.http.services.openclaw.loadbalancer.server.port=8080

  # Full Chrome (Kasm/noVNC) sidecar exposing a CDP endpoint so OpenClaw can drive
  # a real browser, reachable in-network as http://browser:9222. The web desktop
  # (:6901) allows manual login for auth-gated sites. Heavy: large image with
  # meaningful RAM and CPU cost. Kasm publishes no `latest` tag — pin a version.
  # CHROME_ARGS is required: Kasm's Chrome otherwise binds CDP to localhost, so the
  # openclaw container could not reach http://browser:9222.
  browser:
    image: kasmweb/chrome:1.16.0
    restart: unless-stopped
    logging: *default-logging
    environment:
      - CHROME_ARGS=--remote-debugging-port=9222 --remote-debugging-address=0.0.0.0 --remote-allow-origins=*
    volumes:
      - browser-profile:/home/kasm-user
    networks:
      - dokploy-network
    expose:
      - "9222"

volumes:
  openclaw-data:
  browser-profile:

networks:
  dokploy-network:
    external: true
