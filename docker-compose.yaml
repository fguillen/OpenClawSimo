# OpenClaw self-hosted deployment
# Docs: https://docs.openclaw.ai

x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  openclaw:
    image: coollabsio/openclaw:latest
    restart: unless-stopped
    env_file: .env
    logging: *default-logging
    stop_grace_period: 30s
    environment:
      - BROWSER_CDP_URL=http://browser:9222
    volumes:
      - openclaw-data:/data
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.openclaw.rule=Host(`claw.example.es`)
      - traefik.http.routers.openclaw.entrypoints=websecure
      - traefik.http.routers.openclaw.tls.certresolver=letsencrypt
      - traefik.http.services.openclaw.loadbalancer.server.port=8080

  # Headless Chrome sidecar exposing a CDP endpoint so OpenClaw can drive a real
  # browser, reachable in-network as http://browser:9222. Heavy: large image with
  # meaningful RAM and CPU cost.
  browser:
    image: kasmweb/chrome
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - browser-profile:/home/kasm-user
    networks:
      - dokploy-network
    expose:
      - "9222"

volumes:
  openclaw-data:
  browser-profile:

networks:
  dokploy-network:
    external: true
