# OpenClaw self-hosted deployment
# Docs: https://docs.openclaw.ai

x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  openclaw:
    image: coollabsio/openclaw:latest
    restart: unless-stopped
    logging: *default-logging
    stop_grace_period: 30s
    # Env vars are injected via explicit ${VAR} interpolation, set in Dokploy's
    # Environment Settings (Dokploy writes them to a .env next to this file, which
    # Compose auto-loads). Required secrets use :? and fail the deploy loudly if
    # unset; everything else falls back to a safe default. See .env.example.
    environment:
      # Provider keys (set the one(s) you use in Dokploy)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OPENCLAW_PRIMARY_MODEL=${OPENCLAW_PRIMARY_MODEL:-}
      # Auth
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:?set AUTH_PASSWORD in Dokploy Environment Settings}
      # Gateway
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:?set OPENCLAW_GATEWAY_TOKEN in Dokploy Environment Settings}
      - OPENCLAW_GATEWAY_BIND=${OPENCLAW_GATEWAY_BIND:-loopback}
      - OPENCLAW_STATE_DIR=${OPENCLAW_STATE_DIR:-/data/.openclaw}
      - OPENCLAW_WORKSPACE_DIR=${OPENCLAW_WORKSPACE_DIR:-/data/workspace}
      # Declarative config file (mounted read-only below). Holds settings with no
      # env-var equivalent, e.g. agents.defaults.memorySearch.enabled=false.
      - OPENCLAW_CONFIG_PATH=${OPENCLAW_CONFIG_PATH:-/config/openclaw.json}
      # CORS
      - OPENCLAW_ALLOWED_ORIGINS=${OPENCLAW_ALLOWED_ORIGINS:-}
      # Browser sidecar (static, in-network)
      - BROWSER_CDP_URL=http://browser:9222
      # Channels (optional)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_DM_POLICY=${TELEGRAM_DM_POLICY:-allowlist}
      - TELEGRAM_ALLOW_FROM=${TELEGRAM_ALLOW_FROM:-}
      - WHATSAPP_ENABLED=${WHATSAPP_ENABLED:-false}
      - WHATSAPP_DM_POLICY=${WHATSAPP_DM_POLICY:-allowlist}
      - WHATSAPP_ALLOW_FROM=${WHATSAPP_ALLOW_FROM:-}
    volumes:
      - openclaw-data:/data
      # Declarative config, committed to the repo (see OPENCLAW_CONFIG_PATH above).
      # Kept outside /data so it is not shadowed by the openclaw-data volume.
      - ./openclaw.json:/config/openclaw.json:ro
    networks:
      - dokploy-network
    # No Traefik labels here: routing and TLS are configured in Dokploy's Domains
    # UI (service openclaw, container port 8080, letsencrypt certresolver), which
    # generates the Traefik config. The service stays on dokploy-network so
    # Dokploy's Traefik can reach it.
    expose:
      - "8080"

  # Full Chrome (Kasm/noVNC) sidecar exposing a CDP endpoint so OpenClaw can drive
  # a real browser, reachable in-network as http://browser:9222. The web desktop
  # (:6901) allows manual login for auth-gated sites. Heavy: large image with
  # meaningful RAM and CPU cost. Kasm publishes no `latest` tag — pin a version.
  # CHROME_ARGS is required: Kasm's Chrome otherwise binds CDP to localhost, so the
  # openclaw container could not reach http://browser:9222.
  browser:
    image: kasmweb/chrome:1.16.0
    restart: unless-stopped
    logging: *default-logging
    environment:
      - CHROME_ARGS=--remote-debugging-port=9222 --remote-debugging-address=0.0.0.0 --remote-allow-origins=*
    volumes:
      - browser-profile:/home/kasm-user
    networks:
      - dokploy-network
    expose:
      - "9222"

volumes:
  openclaw-data:
  browser-profile:

networks:
  dokploy-network:
    external: true
