# OpenClaw self-hosted deployment
# Docs: https://docs.openclaw.ai

x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  # One-shot permissions fix. The image runs as non-root `node` (UID 1000), but a
  # fresh named volume and Dokploy's files/ bind mount are created root-owned, so
  # node cannot read/write them (EACCES on /home/node/.openclaw and /config). This
  # chowns both to 1000 and exits; openclawsimo waits for it via depends_on. Runs on
  # every deploy — idempotent and cheap.
  init-perms:
    image: busybox:1.36.1
    user: "0:0"
    command: ["sh", "-c", "chown -R 1000:1000 /home/node/.openclaw /config"]
    restart: "no"
    network_mode: none
    volumes:
      - openclaw-data:/home/node/.openclaw
      - ../files/config:/config

  openclawsimo:
    # Official image. GHCR is the primary registry; `openclaw/openclaw` on Docker
    # Hub is the official mirror. Pin a dated tag — do NOT track `latest`. Pick the
    # current stable tag at deploy time (see https://docs.openclaw.ai/install/docker).
    image: ghcr.io/openclaw/openclaw:2026.6.11@sha256:3814fb1f62f9cfc5944de088c5817c68c88b5d721feebe36420b666a90a61ce7
    restart: unless-stopped
    logging: *default-logging
    stop_grace_period: 30s
    depends_on:
      init-perms:
        condition: service_completed_successfully
    # Env vars are injected via explicit ${VAR} interpolation, set in Dokploy's
    # Environment Settings (Dokploy writes them to a .env next to this file, which
    # Compose auto-loads). The official image is config-file-driven, so only secrets
    # and a few infra vars live here; model, channels, tools.deny and agent defaults
    # live in openclaw.json. Required secrets use :? and fail the deploy loudly if
    # unset. See .env.example.
    environment:
      # Provider keys — the official image reads these from env (an anthropic model
      # boots fine with ANTHROPIC_API_KEY set). Set the one(s) you use in Dokploy.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Gateway token — the only auth boundary (there is no nginx / basic auth). Required.
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:?set OPENCLAW_GATEWAY_TOKEN in Dokploy Environment Settings}
      # Declarative config file path — honored by the official image (it watches this
      # exact path). Holds model, channels, tools.deny, agent defaults AND gateway.bind.
      - OPENCLAW_CONFIG_PATH=${OPENCLAW_CONFIG_PATH:-/config/openclaw.json}
      # NOTE: the gateway BIND is NOT an env var on the official image. It is set in
      # openclaw.json as `gateway.bind: "lan"`, so the gateway listens beyond the
      # in-container loopback and Docker can forward the host-loopback-published port
      # (127.0.0.1:18789 below). `0.0.0.0` is rejected — use the named mode `lan`.
    volumes:
      # State, workspace and auth secrets persist here (official layout under
      # /home/node/.openclaw). The image runs as non-root `node` (UID 1000), so this
      # volume must be writable by UID 1000.
      - openclaw-data:/home/node/.openclaw
      # Declarative config (see OPENCLAW_CONFIG_PATH above), holding openclaw.json.
      # A DIRECTORY is mounted at /config — not the single file — because openclaw
      # rewrites the config in place at boot via an atomic rename() (write tmp, rename
      # over target), which fails with EBUSY on a single-file bind mount. The file
      # lives in Dokploy's persistent files/ dir (created via the Dokploy UI as a File
      # Mount, out of git) so the boot rewrite is writable and survives redeploys; the
      # tracked openclaw.example.json is the reference. Ensure ../files/config is
      # writable by UID 1000.
      - ../files/config:/config
    networks:
      - dokploy-network
    # The Control UI is an admin surface, served directly by the gateway on 18789.
    # There is no nginx and no public route: do NOT add a Dokploy Domain for this app.
    # The port is published to the HOST LOOPBACK only, reached over an SSH tunnel (see
    # docs/deploy.md); the gateway token authenticates the session. The service stays
    # on dokploy-network for Dokploy compatibility — the token, not the network, is the
    # auth boundary. Now that the browser sidecar is gone you may move it to a private
    # network for extra isolation.
    ports:
      - "127.0.0.1:18789:18789"

volumes:
  openclaw-data:

networks:
  dokploy-network:
    external: true
